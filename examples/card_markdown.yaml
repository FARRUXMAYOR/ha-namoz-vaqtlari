type: markdown
content: >
  {% set prayers = [
    ("Bomdod",   "sensor.bomdod",   "🌙"),
    ("Quyosh",   "sensor.quyosh",   "🌄"),
    ("Ishroq",   "sensor.ishroq",   "🌅"),
    ("Peshin",   "sensor.peshin",   "☀️"),
    ("Asr",      "sensor.asr",      "🌤"),
    ("Shom",     "sensor.shom",     "🌇"),
    ("Xufton",   "sensor.xufton",   "🌃"),
    ("Tahajjud", "sensor.tahajjud", "⭐")
  ] %}

  {% set now = now() %}

  {% set next_name = namespace(v="") %}
  {% set next_time = namespace(v="") %}
  {% for name, entity, icon in prayers %}
    {% set t = states(entity) %}
    {% if t not in ['unknown','unavailable'] %}
      {% set dt = as_datetime(t) %}
      {% if next_name.v == "" and dt > now %}
        {% set next_name.v = name %}
        {% set next_time.v = dt.strftime("%H:%M") %}
      {% endif %}
    {% endif %}
  {% endfor %}

  <div style="font-family:'Segoe UI',sans-serif;padding:4px 0;">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:1.5em;">🕌</span>
      <span style="font-size:1.15em;font-weight:700;letter-spacing:.5px;">Namoz Vaqtlari</span>
    </div>
    <div style="font-size:.85em;color:#94a3b8;">{{ now.strftime("%d-%m-%Y | %H:%M") }}</div>
  </div>

  {% if next_name.v != "" %}
  <div style="background:linear-gradient(135deg,#1e3a5f,#2d6a4f);border-radius:12px;padding:10px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="font-size:.75em;color:#90e0b0;letter-spacing:1px;text-transform:uppercase;">Keyingi namoz</div>
      <div style="font-size:1.3em;font-weight:700;color:#fff;">{{ next_name.v }}</div>
    </div>
    <div style="font-size:1.8em;font-weight:800;color:#4ade80;">{{ next_time.v }}</div>
  </div>
  {% endif %}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
  {% for name, entity, icon in prayers %}
    {% set t = states(entity) %}
    {% if t not in ['unknown','unavailable'] %}
      {% set dt = as_datetime(t) %}
      {% set passed = dt < now %}
      {% set is_next = name == next_name.v %}
      {% if is_next %}
  <div style="background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:6px;">
      <span>{{ icon }}</span>
      <span style="font-weight:600;color:#4ade80;">{{ name }}</span>
    </div>
    <span style="font-weight:700;color:#4ade80;font-size:1.05em;">{{ dt.strftime("%H:%M") }}</span>
  </div>
      {% elif passed %}
  <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;opacity:.45;">
    <div style="display:flex;align-items:center;gap:6px;">
      <span>{{ icon }}</span>
      <span>✓ {{ name }}</span>
    </div>
    <span style="font-size:1.05em;">{{ dt.strftime("%H:%M") }}</span>
  </div>
      {% else %}
  <div style="background:rgba(255,255,255,.06);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:6px;">
      <span>{{ icon }}</span>
      <span>{{ name }}</span>
    </div>
    <span style="font-size:1.05em;">{{ dt.strftime("%H:%M") }}</span>
  </div>
      {% endif %}
    {% endif %}
  {% endfor %}
  </div>

  </div>
